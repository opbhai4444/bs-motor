<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — BS Motors</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/consumer-nav.js"></script>

<div class="page-wrap">

  <div class="bsm-breadcrumb">
    <a href="/consumer/index.html">Home</a>
    <span>›</span>
    <span>My Orders</span>
  </div>

  <!-- Page header banner -->
  <div class="orders-page-header">
    <div class="oph-left">
      <div class="oph-icon">📦</div>
      <div>
        <div class="oph-title">My Orders</div>
        <div class="oph-sub">Track and manage your purchases</div>
      </div>
    </div>
    <a href="/consumer/index.html" class="oph-shop-btn">+ Shop More Parts</a>
  </div>

  <div class="orders-wrap">
    <div id="ordersList"></div>
    <div id="ordersEmpty" class="empty-state" style="display:none">
      <div class="icon">📦</div>
      <p>No orders yet</p>
      <a href="/consumer/index.html" class="btn-browse-parts">Browse Parts</a>
    </div>
  </div>

</div>

<!-- Order detail modal -->
<div class="modal-overlay" id="orderModal">
  <div class="modal-box order-modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="orderDetail"></div>
  </div>
</div>

<script>
const PAY_ICONS = { cash:'💵', upi:'📱', card:'💳' };
const STATUS_ICONS = { pending:'🕐', confirmed:'✅', shipped:'🚚', delivered:'📦', cancelled:'❌' };
const STEPS = ['pending','confirmed','shipped','delivered'];

async function init() {
  const user = await ConsumerNav.requireLogin();
  if (!user) return;
  I18n.init();
  const orders = await API.get('/api/consumer/orders');
  const list  = document.getElementById('ordersList');
  const empty = document.getElementById('ordersEmpty');
  if (!orders.length) { list.style.display='none'; empty.style.display='block'; return; }
  list.innerHTML = orders.map(o => {
    const date    = new Date(o.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
    const stepIdx = STEPS.indexOf(o.status);
    const pct     = stepIdx < 0 ? 0 : Math.round(stepIdx/(STEPS.length-1)*100);
    return `
    <div class="oc-card" onclick="viewOrder('${o.order_no}')">
      <div class="oc-top">
        <div class="oc-left">
          <div class="oc-no">${o.order_no}</div>
          <div class="oc-date">🗓 ${date} &nbsp;·&nbsp; ${PAY_ICONS[o.payment_method]||'💳'} ${o.payment_method||'cash'}</div>
        </div>
        <div class="oc-right">
          <span class="status-badge status-${o.status}">${STATUS_ICONS[o.status]||''} ${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
        </div>
      </div>
      <div class="oc-tracker">
        <div class="oct-bar"><div class="oct-fill" style="width:${pct}%"></div></div>
        <div class="oct-steps">
          ${STEPS.map((s,i)=>`<div class="oct-step ${i<=stepIdx?'done':''}"><div class="oct-dot"></div><div class="oct-lbl">${s}</div></div>`).join('')}
        </div>
      </div>
      <div class="oc-bottom">
        <div class="oc-total">₹${parseFloat(o.total).toFixed(2)}</div>
        <button class="oc-view-btn" onclick="event.stopPropagation();viewOrder('${o.order_no}')">View Details →</button>
      </div>
    </div>`;
  }).join('');
}

async function viewOrder(order_no) {
  const o = await API.get('/api/consumer/orders/'+order_no);
  const stepIdx = STEPS.indexOf(o.status);
  const pct     = stepIdx < 0 ? 0 : Math.round(stepIdx/(STEPS.length-1)*100);
  document.getElementById('orderDetail').innerHTML = `
    <div class="od-header">
      <div>
        <div class="od-no">${o.order_no}</div>
        <div class="od-meta">${new Date(o.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <span class="status-badge status-${o.status}">${STATUS_ICONS[o.status]||''} ${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
    </div>

    <div class="od-tracker">
      <div class="odt-bar"><div class="odt-fill" style="width:${pct}%"></div></div>
      <div class="odt-steps">
        ${STEPS.map((s,i)=>`
          <div class="odt-step ${i<=stepIdx?'done':''}">
            <div class="odt-dot">${i<stepIdx?'✓':i===stepIdx?'●':''}</div>
            <div class="odt-lbl">${s.charAt(0).toUpperCase()+s.slice(1)}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="od-section-title">Items Ordered</div>
    <div class="od-items">
      ${o.items.map(item=>`
        <div class="od-item">
          <div class="od-item-img">
            ${item.image?`<img src="${item.image}" alt="${item.name_en}">`:`<div class="od-no-img">⚙️</div>`}
          </div>
          <div class="od-item-body">
            <div class="od-item-name">${item.name_en}</div>
            <div class="od-item-qty">Qty: ${item.qty} × ₹${parseFloat(item.unit_price).toFixed(2)}</div>
          </div>
          <div class="od-item-total">₹${parseFloat(item.total).toFixed(2)}</div>
        </div>`).join('')}
    </div>

    <div class="od-summary">
      <div class="od-summary-row"><span>Subtotal</span><span>₹${parseFloat(o.subtotal).toFixed(2)}</span></div>
      <div class="od-summary-row"><span>Delivery</span><span class="free-tag">FREE</span></div>
      <div class="od-summary-row od-grand"><span>Grand Total</span><span>₹${parseFloat(o.total).toFixed(2)}</span></div>
    </div>

    <div class="od-footer-info">
      <span>${PAY_ICONS[o.payment_method]||'💳'} ${(o.payment_method||'cash').toUpperCase()} — <strong>${o.payment_status||'pending'}</strong></span>
      ${o.notes?`<span>📝 ${o.notes}</span>`:''}
    </div>`;
  document.getElementById('orderModal').classList.add('open');
}

function closeModal() { document.getElementById('orderModal').classList.remove('open'); }
document.getElementById('orderModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
init();
</script>
</body>
</html>
