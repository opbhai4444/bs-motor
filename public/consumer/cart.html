<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Cart — BS Motors</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/consumer-nav.js"></script>

<div class="page-wrap">

  <div class="bsm-breadcrumb">
    <a href="/consumer/index.html">Home</a>
    <span>›</span>
    <span>My Cart</span>
  </div>

  <div id="cartContent" style="display:none">
    <div class="cart-layout">

      <div class="cart-items-col">
        <div class="cart-col-header">
          <h2 class="cart-page-title">🛒 My Cart &nbsp;<span id="cartCountBadge" class="cart-count-badge">0 items</span></h2>
          <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
        </div>
        <div id="cartItemsList"></div>
      </div>

      <div class="cart-summary-col">
        <div class="cart-summary-card">
          <div class="summary-heading">Order Summary</div>

          <div class="summary-row"><span>Subtotal (<span id="summaryCount">0</span> items)</span><span id="subtotal">₹0.00</span></div>
          <div class="summary-row"><span>Delivery</span><span class="free-tag">FREE</span></div>
          <div class="summary-divider"></div>
          <div class="summary-row summary-total"><span>Total</span><span id="totalAmt">₹0.00</span></div>

          <div class="pay-method-label">Payment Method</div>
          <div class="pay-opts">
            <label class="pay-opt active">
              <input type="radio" name="payment" value="cash" checked onchange="highlightPay(this)">
              <span>💵 Cash on Delivery</span>
            </label>
            <label class="pay-opt">
              <input type="radio" name="payment" value="upi" onchange="highlightPay(this)">
              <span>📱 UPI</span>
            </label>
            <label class="pay-opt">
              <input type="radio" name="payment" value="card" onchange="highlightPay(this)">
              <span>💳 Card</span>
            </label>
          </div>

          <label class="notes-label">Order Notes <em>(optional)</em></label>
          <textarea id="orderNotes" rows="2" placeholder="Delivery instructions, vehicle model, etc."></textarea>

          <button class="btn-place-order" id="btnPlace" onclick="placeOrder()">Place Order →</button>
          <a href="/consumer/index.html" class="btn-continue">← Continue Shopping</a>
        </div>

        <div class="trust-row">
          <div class="trust-item">🔒 Secure</div>
          <div class="trust-item">🚚 Fast Dispatch</div>
          <div class="trust-item">✅ Genuine</div>
        </div>
      </div>

    </div>
  </div>

  <div id="emptyCart" class="empty-state" style="display:none">
    <div class="icon">🛒</div>
    <p>Your cart is empty</p>
    <a href="/consumer/index.html" class="btn-browse-parts">Browse Parts</a>
  </div>

</div>
<script>
let cartItems = [];

async function init() {
  const user = await ConsumerNav.requireLogin();
  if (!user) return;
  I18n.init();
  await loadCart();
}

async function loadCart() {
  cartItems = await API.get('/api/consumer/cart');
  if (!cartItems.length) {
    document.getElementById('cartContent').style.display = 'none';
    document.getElementById('emptyCart').style.display  = 'block';
    return;
  }
  document.getElementById('cartContent').style.display = 'block';
  document.getElementById('emptyCart').style.display   = 'none';
  renderCart();
}

function renderCart() {
  document.getElementById('cartCountBadge').textContent = cartItems.length + ' item' + (cartItems.length !== 1 ? 's' : '');
  document.getElementById('summaryCount').textContent   = cartItems.length;
  document.getElementById('cartItemsList').innerHTML = cartItems.map(item => `
    <div class="ci-card" id="ci-${item.part_id}">
      <div class="ci-img">
        ${item.image ? `<img src="${item.image}" alt="${item.name_en}">` : `<div class="ci-no-img">⚙️</div>`}
      </div>
      <div class="ci-body">
        <div class="ci-name">${item.name_en}</div>
        <div class="ci-meta">
          ${item.brand  ? `<span class="ci-brand">${item.brand}</span>` : ''}
          ${item.sku    ? `<span class="ci-sku">${item.sku}</span>`     : ''}
        </div>
        <div class="ci-unit-price">₹${parseFloat(item.price).toFixed(2)} / ${item.unit || 'pc'}</div>
        ${item.stock > 0 && item.stock <= 5 ? `<div class="ci-low-stock">⚠ Only ${item.stock} left</div>` : ''}
      </div>
      <div class="ci-right">
        <div class="qty-stepper">
          <button onclick="changeQty(${item.part_id},${item.qty-1})" ${item.qty<=1?'disabled':''}>−</button>
          <span>${item.qty}</span>
          <button onclick="changeQty(${item.part_id},${item.qty+1})" ${item.qty>=item.stock?'disabled':''}>+</button>
        </div>
        <div class="ci-row-total">₹${(item.price*item.qty).toFixed(2)}</div>
        <button class="ci-remove" onclick="removeItem(${item.part_id})" title="Remove">🗑</button>
      </div>
    </div>
  `).join('');
  updateTotals();
}

function updateTotals() {
  const sub = cartItems.reduce((s,i) => s + i.price*i.qty, 0);
  document.getElementById('subtotal').textContent = '₹' + sub.toFixed(2);
  document.getElementById('totalAmt').textContent = '₹' + sub.toFixed(2);
}

async function changeQty(part_id, qty) {
  if (qty < 1) return;
  const item = cartItems.find(i => i.part_id === part_id);
  if (!item) return;
  if (qty > item.stock) { API.toast('Only ' + item.stock + ' in stock', 'warning'); return; }
  await API.post('/api/consumer/cart', { part_id, qty });
  item.qty = qty;
  renderCart();
}

async function removeItem(part_id) {
  const card = document.getElementById('ci-' + part_id);
  if (card) { card.style.opacity='.3'; card.style.pointerEvents='none'; }
  await API.delete('/api/consumer/cart/' + part_id);
  cartItems = cartItems.filter(i => i.part_id !== part_id);
  ConsumerNav._setCart(cartItems.length);
  if (!cartItems.length) {
    document.getElementById('cartContent').style.display = 'none';
    document.getElementById('emptyCart').style.display  = 'block';
  } else {
    renderCart();
  }
}

async function clearAll() {
  if (!confirm('Remove all items from cart?')) return;
  await Promise.all(cartItems.map(i => API.delete('/api/consumer/cart/'+i.part_id)));
  cartItems = [];
  ConsumerNav._setCart(0);
  document.getElementById('cartContent').style.display = 'none';
  document.getElementById('emptyCart').style.display  = 'block';
}

function highlightPay(radio) {
  document.querySelectorAll('.pay-opt').forEach(el => el.classList.remove('active'));
  radio.closest('.pay-opt').classList.add('active');
}

async function placeOrder() {
  const btn = document.getElementById('btnPlace');
  btn.textContent='Placing order…'; btn.disabled=true;
  const res = await API.post('/api/consumer/orders', {
    payment_method: document.querySelector('input[name="payment"]:checked').value,
    notes: document.getElementById('orderNotes').value.trim() || null
  });
  if (res.ok) {
    API.toast('Order placed! ' + res.order_no + ' 🎉');
    ConsumerNav._setCart(0);
    setTimeout(() => window.location.href='/consumer/orders.html', 1500);
  } else {
    API.toast(res.message||'Order failed','error');
    btn.textContent='Place Order →'; btn.disabled=false;
  }
}

init();
</script>
</body>
</html>
