<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0a1628">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Register — BS Motors</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:1.25rem">
      <div style="font-size:2.5rem">🔧</div>
      <h2>BS Motors</h2>
      <p class="subtitle">Create your account</p>
    </div>
    <form id="regForm">
      <div class="form-group"><label>Full Name *</label><input type="text" id="name" required placeholder="Your full name"></div>
      <div class="form-group"><label>Email *</label><input type="email" id="email" required placeholder="you@email.com"></div>
      <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="10-digit mobile number"></div>
      <div class="form-group"><label>Address</label><textarea id="address" rows="2" placeholder="Your address"></textarea></div>
      <div class="form-group"><label>Password *</label><input type="password" id="password" required placeholder="Minimum 6 characters"></div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
    <div class="auth-link">Already have an account? <a href="/consumer/login.html">Login</a></div>
    <div style="text-align:center;margin-top:1rem">
      <button id="lang-toggle" style="margin:0 auto;display:block">हिंदी</button>
    </div>
  </div>
</div>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script>
I18n.init();
document.getElementById('regForm').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await API.post('/api/auth/register', {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    address: document.getElementById('address').value,
    password: document.getElementById('password').value
  });
  if (res.ok) { API.toast(res.message); setTimeout(() => window.location.href='/consumer/login.html', 1500); }
  else API.toast(res.message, 'error');
});
</script>
</body>
</html>
